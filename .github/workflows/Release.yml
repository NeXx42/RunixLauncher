name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      OUTPUT_DIR: ./Build/Output/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            desktop-file-utils \
            libglib2.0-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            flatpak \
            flatpak-builder

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool
          
      - name: Download flatpak SDK
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08
          
      - name: Build
        run: make publish
          
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunixLauncher-AppImage
          path: ${{ env.OUTPUT_DIR }}/RunixLauncher.appimage
          
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunixLauncher-Flatpak
          path: ${{ env.OUTPUT_DIR }}/RunixLauncher.flatpak
          
  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
        contents: write

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
            name: RunixLauncher-AppImage
            path: ./output
            
      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
            name: RunixLauncher-Flatpak
            path: ./output

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
            tag_name: ${{ github.event.inputs.version }}
            name: v${{ github.event.inputs.version }}
            files: |
              ./output/RunixLauncher.appimage
              ./output/RunixLauncher.flatpak